<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div class="site-footer-inner" style="text-align: center;">
      {%- assign currentYear = 'now' | date: "%Y" -%}
      {%- assign copyright = site.copyright
      | replace: '{currentYear}', currentYear
      | replace: '{author}', site.author
      | replace: '(c)', '&copy;'
      | replace: '(p)', '℗'
      | replace: '(cleft)', '<span class="copyleft">&copy;</span>'
      -%}
      <div style="text-align: center;">{{ copyright }}</div>
      <div style="text-align: center;">Powered by <a title="Jekyll is a simple, blog-aware, static site generator." href="https://jekyllrb.com/" style="text-align: center;">Jekyll</a> &amp; <a title="Yat,
       yet another theme." href="https://github.com/jeffreytse/jekyll-theme-yat" style="text-align: center;">Yat Theme</a>.</div>
    </div>
  </div>
</footer>
