# 欢迎来到 Jekyll！
#
# 关于主题
#
# 又一个为优雅作家创作的主题，具有现代、扁平的风格和美观的风格
# 夜间/黑暗模式。
#
# 网站： https://github.com/jeffreytse/jekyll-theme-yat
#
# 你可以做任何你想做的事，包括为你的客户做项目，只要
# 当您提到归因时（页脚或项目中的信用链接）。
# 请参阅 LICENCE 文件。
#
# 此配置文件用于影响整个博客的设置，值
# 您需要设置一次，之后很少编辑。
#
# 由于技术原因，当您
# 使用 'bundle exec jekyll serve'。如果您更改此文件，请重新启动
# 服务器进程。
#
# 网站设置
# 这些用于个性化您的新网站。如果您查看 HTML 文件，
# 您将看到它们通过 {{ site.title }}、{{ site.email }} 等访问。
# 您可以创建任何您想要的自定义变量，并且它们将可以访问
# 通过 {{ site.myvariable }} 在模板中。

title: xyhao's Blog
email: xyhaomail@163.com
author: xyhao

# 版权设置
# 你可以使用任何html代码，目前下面有几个占位符可用：
# * 当前年份： {currentYear}
# * author： {author} （值与site.author相同）
# * 版权所有： （c） - ©
# * copyleft： （裂口）
# * 录音版权：（p） - ℗
#
# 例如：
# “版权所有 （c） 2017-{currentYear} <a href=”https://example.com“>{author}</a>”
# “版权所有 © 2017-2021 Foobar”
copyright: "Copyright © 2024-{currentYear} {author}"

description: >- # 这意味着忽略换行符，直到“BaseURL："
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.

baseurl: "" # 您网站的子路径，例如 /blog
url: "" # 您站点的基本主机名和协议，例如 https://example.com
favicon: "/favicon.png" # 您的网站网站图标

# Yat date format
# refer to https://shopify.github.io/liquid/filters/date/ if you want to customize this
yat:
  date_format: "%b %d, %Y"

# 如果需要更多的调试日志，可以设置 true
# debug： false

# 如果你不想要透明的标题，你可以设置 false
# header_transparent：真

# 如果要更改内容宽度，可以设置为另一个值
# content_width： “920px”

# Google 分析 - GA4
# google_analytics：[测量ID]
# enableDNT： “false”

# 如果要生成网站站点地图，可以设置 true
sitemap: true

# 如果您想更改网站语言，您可以设置 语言选项
lang: "zh-CN"  # default lang is zh-CN

# 翻译语言
# langs refer to https://cloud.google.com/translate/docs/languages
# translate_langs:
#   - lang: en
#     img: https://cdn.countryflags.com/thumbs/united-states-of-america/flag-400.png
#     text: English
#
#   - lang: fr
#     img: https://cdn.countryflags.com/thumbs/france/flag-400.png
#     text: French
#
#   - lang: zh-CN
#     img: https://cdn.countryflags.com/thumbs/china/flag-400.png
#     text: Chinese(Simple)
#
#   - lang: ja
#     img: https://cdn.countryflags.com/thumbs/japan/flag-400.png
#     text: Japanese
#
#   - lang: ko
#     img: https://cdn.countryflags.com/thumbs/south-korea/flag-400.png
#     text: Korean
#
#   - lang: ru
#     img: https://cdn.countryflags.com/thumbs/russia/flag-400.png
#     text: Russian

# 您可以选择主题颜色
# 默认主题颜色如下：
# coolblack: #090a0b
# spacegrey: #353535
# snowwhite: #ffffff
#
theme_color: snowwhite
#
# Custom color as below:
# theme_color: "#882250"

# 您可以选择品牌颜色
# 默认品牌颜色如下：
# orangered: #ff5100
# greatgold: #f2cb05
# greenblue: #389092
#
# brand_color: orangered
#
# Custom color as below:
# brand_color: "#1a8e42"

# 您可以自定义选择样式
# selection:
#   color: "#ff00ff"
#   background_color: "yellow"

# 夜间/黑暗模式
# 默认模式为“自动”，“自动”用于自动夜班
# （19：00 - 07：00），“手动”用于手动切换，以及
# “开/关”为默认开/关。
#
# 无论用户的选择是什么，它都会取代
# 网站的默认设置，并在
# 访问（会话）。只有暗模式设置是“手动”，
# 它将在每次访问时始终保留（即无论
# 浏览器是否关闭）
#
# night_mode: "auto"

# 代码徽章设置
# 您可以启用或禁用代码徽章等
# code_badge:
#   enabled: "true"
#   color: "#fff"
#   background_color: "#ff4e00"
#   text_transform: "uppercase"  # ("uppercase", "lowercase", "capitalize")

# 如果您只想链接标题中的特定页面，请取消注释
# 这个并按照它们应该显示的顺序添加页面的路径
# header_pages:
#   - index.html
#   - archives.html
#   - categories.html
#   - tags.html
#   - about.md

# 页面默认值
# defaults:
#   home:
#     heading: "Your awesome heading"
#     subheading: "Your awesome subheading"
#     banner: "Your image url"

# 横幅广告默认设置
# 这些横幅广告设置是针对全局横幅广告的默认设置，但您也可以
# 通过前言为一个特定的帖子配置它
# banner:
#   video: null             # Video banner source
#   loop: true              # Video loop
#   volume: 0               # Video volume (100% is 1.0)
#   start_at: 0             # Video start time
#   image: null             # Image banner source
#   opacity: 1.0            # Banner opacity (100% is 1.0)
#   background: "rgba(0, 0, 0, 0.8)"  # Banner background (Could be a image)
#   height: "640px"         # Banner default height
#   min_height: null        # Banner minimum height
#   heading_style: null     # Custom heading style (e.g. "font-weight: bold; text-decoration: underline")
#   subheading_style: null  # Custom subheading style (e.g. color: gold)

# 摘录设置
# excerpt:
#   default_image: /assets/images/default-image.jpeg  # 当图像样式不是无时的默认图像
#   image_style: z          # 图像布局样式（其值可以是 none、left、right、top、z、z-reverse）
#   image_width: 38.2%      # Image default width
#   image_height: 160px     # Image default height
#   text_size: 350          # Words default size

# Pagination setting
paginate: 10

# 照片预览器设置（PhotoSwipe 5）
# the options please refer to: https://photoswipe.com/options/
# photo_previewer:
#  gallery: "section.main"
#  children: "a.photo-swipe"
#  bgOpacity: 0.8
#  padding:
#    top: 20
#    bottom: 40
#    left: 100
#    right: 100

# 点击返回顶部设置
# click_to_top:
#   light:
#     background_color: "white"
#     color: "#454545"
#   dark:
#     background_color: "#34323d"
#     color: "#bbb"

# Disqus comments
#disqus:
#   shortname: "xyhao"

# Gitment 注释
# gitment:
#   username: "Your GitHub username"
#   repo: "The repo to store comments"
#   client_id: "Your client ID"
#   client_secret: "Your client secret"
#   redirect_uri: "Your redirect url"   # If you use a custom domain name

# 话语注释
# See https://utteranc.es/
# set follow_site_theme true to make utterances' theme follow the site's

# utterances:
#   repo: "owner/repo"
#   issue_term: "title"
#   label: "utterances comment"
#   theme: "github-light"
#   follow_site_theme: true

# Build settings
# highlighter: none
markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship
